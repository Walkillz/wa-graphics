  .dot { display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:6px; vertical-align:middle; background:#666;}
  .dot.ok{ background:#2ecc71;} .dot.err{ background:#E63946;} .dot.load{ background:#FFD60A;}

  button.primary{ background:#E63946; border-color:#E63946;} button.primary:hover:not(:disabled){ background:#c12d39;}
  button.yellow{ background:#FFD60A; color:#111; border-color:#FFD60A; font-weight:600;} button.yellow:hover:not(:disabled){ background:#e6c009;}

  .tab { padding:10px 22px; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:6px; font-size:14px; font-weight:600; cursor:pointer; color:#999;}

  .bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; gap:12px; flex-wrap:wrap;}
  .bar .count{ color:#999; font-size:13px;}
  .games { display:grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap:16px;}
  .card { background:#1a1a1a; border:1px solid #2a2a2a; border-radius:10px; padding:14px; }
  .card .teams { font-size:15px; font-weight:600; margin-bottom:6px; }
  .card .time { font-size:12px; color:#999; margin-bottom:10px;}
  .card .score { font-size:22px; font-weight:700; color:#FFD60A; margin-bottom:6px;}
  .badge { display:inline-block; padding:3px 8px; border-radius:4px; font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase;}
  .badge.live{ background:#E63946;} .badge.final{ background:#666;} .badge.sched{ background:#333; color:#999;}
  .lines { display:flex; gap:10px; font-size:11px; color:#ccc; margin-top:8px; flex-wrap:wrap;}
  .lines span{ background:#111; padding:4px 8px; border-radius:4px; border:1px solid #2a2a2a;}
  .no-odds{ color:#777; font-size:11px; font-style:italic; margin-top:8px;}

/* ---------- Lines cache helpers ---------- */
function buildLineKey(sport, line) {
  const t1 = cleanTeamName(line.Team1ID || line.Team1Description || line.Team1Name || "");
  const t2 = cleanTeamName(line.Team2ID || line.Team2Description || line.Team2Name || "");

/* ============================================================
   Matching: WA line → ESPN event
   ============================================================ */
function cleanTeamName(s) {
  if (!s) return "";
  // Strip doubleheader suffixes like " GM1", " GM2", " Game 1", " (1)", etc.
  return String(s).replace(/\s+GM\s*\d+$/i,"").replace(/\s+Game\s*\d+$/i,"").replace(/\s*\(\d+\)$/,"").trim();
}

function resolveAbbr(sport, waFullName) {
  if (!waFullName) return null;
  const clean = cleanTeamName(waFullName);
  const map = NAME_MAP[sport] || {};
  if (map[clean]) return map[clean];
  // try case/whitespace insensitive
  const norm = clean.toLowerCase();
  for (const k of Object.keys(map)) if (k.toLowerCase() === norm) return map[k];
  // last resort: match by last word (e.g. "Yankees")
  const last = norm.split(/\s+/).pop();
  for (const k of Object.keys(map)) if (k.toLowerCase().endsWith(last)) return map[k];
  return null;
}

function waTeamName(line, which) {
  // which=1 (away) or 2 (home)
  const raw = line["Team"+which+"ID"] || line["Team"+which+"Description"] || line["Team"+which+"Name"] || line["Team"+which] || "";
  return cleanTeamName(raw);
}

function matchGame(sport, line, events) {
  // In WA API, Team1ID/Team2ID contain the full team names (Team1 is away, Team2 is home)
  const a1 = resolveAbbr(sport, waTeamName(line,1));
  const a2 = resolveAbbr(sport, waTeamName(line,2));
  if (!a1 || !a2) return { away: a1, home: a2, event: null };
  for (const ev of events) {
    const comp = ev.competitions && ev.competitions[0];
    if (!comp) continue;
    const away = comp.competitors.find(c => c.homeAway === "away");
    const home = comp.competitors.find(c => c.homeAway === "home");
    if (!away || !home) continue;
    const aAbbr = (away.team.abbreviation || "").toUpperCase();
    const hAbbr = (home.team.abbreviation || "").toUpperCase();
    if ((aAbbr===a1 && hAbbr===a2) || (aAbbr===a2 && hAbbr===a1)) {
      return { away:a1, home:a2, event: ev, awayAbbr:aAbbr, homeAbbr:hAbbr };
    }
  }
  return { away:a1, home:a2, event:null };
}

function extractEventInfo(ev, sport) {
  if (!ev) return null;
  sport = sport || state.sport;
  const comp = ev.competitions[0];
  const away = comp.competitors.find(c=>c.homeAway==="away");
  const home = comp.competitors.find(c=>c.homeAway==="home");
  const statusName = comp.status && comp.status.type && comp.status.type.name;
  let status = "SCHEDULED";
  if (statusName === "STATUS_FINAL") status = "FINAL";
  else if (statusName === "STATUS_IN_PROGRESS") status = "LIVE";
  const awayAbbr = (away.team.abbreviation||"").toUpperCase();
  const homeAbbr = (home.team.abbreviation||"").toUpperCase();
  return {
    status,
    awayScore: parseInt(away.score||"0",10),
    homeScore: parseInt(home.score||"0",10),
    awayName: away.team.displayName,
    homeName: home.team.displayName,

    homeLogo: getTeamLogo(sport, homeAbbr, home.team.logo),
    date: ev.date,
    shortName: ev.shortName
  };
}

/* ---------- Team logo fallback ---------- */

  // Primary: ESPN API logo
  if (espnLogoUrl) return espnLogoUrl;
  // Fallback: ESPN static URL pattern
  const sportPath = { MLB: "mlb", NBA: "nba", NHL: "nhl" };
  const s = sportPath[sport];
  if (s && abbr) {
    return `https://a.espncdn.com/i/teamlogos/${s}/500/${abbr.toLowerCase()}.png`;
  }
  // Return null — rendering code draws a text circle fallback
  return null;
}

/* ---------- Image cache ---------- */
const imgCache = {};
function loadImage(url) {
  if (!url) return Promise.resolve(null);
  if (imgCache[url]) return imgCache[url];
  imgCache[url] = new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = url;
  });
  return imgCache[url];
}
function getLogo(url) {
  // synchronous accessor: returns resolved Image or null
  if (!url || !imgCache[url]) return null;
  // best-effort: if the promise already resolved, return the image
  const p = imgCache[url];
  return p && p.__resolved || null;
}
async function preloadLogos(urls) {
  const uniq = [...new Set(urls.filter(Boolean))];
  await Promise.all(uniq.map(async u => {
    const img = await loadImage(u);
    imgCache[u].__resolved = img;
  }));
}

function teamColors(sport, abbr) {

}

function roundRect(ctx, x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function drawDiagonalStripes(ctx, color, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.translate(540, 540);
  ctx.rotate(-Math.PI/6);
  for (let i=-1200;i<1200;i+=80) ctx.fillRect(i,-1200,2,2400);
  ctx.restore();
}

function drawTeamCircle(ctx, cx, cy, r, colors, abbr, borderColor, logoImg) {
  const grd = ctx.createRadialGradient(cx-r*0.3, cy-r*0.3, r*0.1, cx, cy, r);
  grd.addColorStop(0, colors[1]);
  grd.addColorStop(1, colors[0]);
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
  // Logo (clipped to circle) on top of gradient
  if (logoImg) {
    ctx.save();
    ctx.beginPath(); ctx.arc(cx,cy,r-6,0,Math.PI*2); ctx.clip();
    // white inner disc for logo contrast
    ctx.fillStyle = "rgba(255,255,255,0.92)";
    ctx.beginPath(); ctx.arc(cx,cy,r-6,0,Math.PI*2); ctx.fill();
    const sz = (r-6)*1.55;
    ctx.drawImage(logoImg, cx-sz/2, cy-sz/2, sz, sz);
    ctx.restore();
  } else {
    ctx.fillStyle = "#fff";
    ctx.font = `bold ${r*0.55}px -apple-system, Arial, sans-serif`;
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.shadowColor="rgba(0,0,0,0.6)"; ctx.shadowBlur=6;
    ctx.fillText(abbr, cx, cy);
    ctx.shadowBlur=0;
  }
  ctx.strokeStyle = borderColor || "#FFD60A";
  ctx.lineWidth = 5;
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
}

/* ---------- Result indicator icons ---------- */
function drawCheckmark(ctx, x, y, size) {
  size = size || 24;
  // Green circle
  ctx.beginPath();
  ctx.arc(x, y, size / 2, 0, Math.PI * 2);
  ctx.fillStyle = "#4ade80";
  ctx.fill();
  // White check path
  ctx.beginPath();
  ctx.moveTo(x - size * 0.25, y);
  ctx.lineTo(x - size * 0.05, y + size * 0.2);
  ctx.lineTo(x + size * 0.25, y - size * 0.2);
  ctx.strokeStyle = "#ffffff";
  ctx.lineWidth = 2.5;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.stroke();
}
function drawXmark(ctx, x, y, size) {
  size = size || 24;
  // Red circle
  ctx.beginPath();
  ctx.arc(x, y, size / 2, 0, Math.PI * 2);
  ctx.fillStyle = "#f87171";
  ctx.fill();
  // White X
  const d = size * 0.2;
  ctx.beginPath();
  ctx.moveTo(x - d, y - d);
  ctx.lineTo(x + d, y + d);
  ctx.moveTo(x + d, y - d);
  ctx.lineTo(x - d, y + d);
  ctx.strokeStyle = "#ffffff";
  ctx.lineWidth = 2.5;
  ctx.lineCap = "round";
  ctx.stroke();
}
function drawPushIcon(ctx, x, y, size) {
  size = size || 24;
  // Yellow circle
  ctx.beginPath();
  ctx.arc(x, y, size / 2, 0, Math.PI * 2);
  ctx.fillStyle = "#FFD60A";
  ctx.fill();
  // White dash
  ctx.beginPath();
  ctx.moveTo(x - size * 0.2, y);
  ctx.lineTo(x + size * 0.2, y);
  ctx.strokeStyle = "#ffffff";
  ctx.lineWidth = 2.5;
  ctx.lineCap = "round";
  ctx.stroke();
}

function fmtJuice(v){
  if (v===undefined||v===null||v==="") return "";
  const n = Number(v);
  if (isNaN(n)) return String(v);
  return (n>0?"+":"")+n;
}
function fmtSpread(v){
  if (v===undefined||v===null||v==="") return "";
  const n = Number(v);
  if (isNaN(n)) return String(v);
  return (n>0?"+":"")+n;
}

function renderPostGame(canvas, sport, waLine, eventInfo) {
  const ctx = canvas.getContext("2d");
  canvas.width = 1080; canvas.height = 1080;

  ctx.fillStyle = "#111"; ctx.fillRect(0,0,1080,1080);
  ctx.fillStyle = "#E63946"; ctx.fillRect(0,0,1080,6);
  drawDiagonalStripes(ctx, "#FFD60A", 0.03);

  // Header
  ctx.fillStyle = "#fff"; ctx.font="bold 28px -apple-system, Arial, sans-serif"; ctx.textAlign="left"; ctx.textBaseline="top";
  ctx.fillText("WAGERATTACK", 50, 40);
  ctx.fillStyle="#999"; ctx.font="bold 22px -apple-system, Arial, sans-serif"; ctx.textAlign="right";
  ctx.fillText(sport.toUpperCase(), 1030, 46);

  // FINAL badge
  ctx.fillStyle="#E63946";
  roundRect(ctx, 470, 90, 140, 44, 8); ctx.fill();
  ctx.fillStyle="#fff"; ctx.font="bold 22px -apple-system, Arial, sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText("FINAL", 540, 112);

  const awayAbbr = eventInfo.awayAbbr, homeAbbr = eventInfo.homeAbbr;
  const awayScore = eventInfo.awayScore, homeScore = eventInfo.homeScore;
  const awayWon = awayScore > homeScore;
  const tie = awayScore === homeScore;

  // Circles — try eventInfo logo, then fallback URL
  const awayLogoUrl = eventInfo.awayLogo || getTeamLogo(sport, awayAbbr, null);
  const homeLogoUrl = eventInfo.homeLogo || getTeamLogo(sport, homeAbbr, null);
  const awayLogo = getLogo(awayLogoUrl);
  const homeLogo = getLogo(homeLogoUrl);
  drawTeamCircle(ctx, 280, 280, 130, teamColors(sport,awayAbbr), awayAbbr, awayWon?"#FFD60A":"#333", awayLogo);
  drawTeamCircle(ctx, 800, 280, 130, teamColors(sport,homeAbbr), homeAbbr, (!awayWon&&!tie)?"#FFD60A":"#333", homeLogo);

  // Scores
  ctx.font="bold 92px -apple-system, Arial, sans-serif"; ctx.textAlign="center"; ctx.textBaseline="top";
  ctx.fillStyle = awayWon?"#FFD60A":"#fff"; ctx.fillText(String(awayScore), 280, 430);
  ctx.fillStyle = (!awayWon&&!tie)?"#FFD60A":"#fff"; ctx.fillText(String(homeScore), 800, 430);

  // Winning team checkmark next to score
  if (!tie) {
    if (awayWon) drawCheckmark(ctx, 380, 470, 30);
    else drawCheckmark(ctx, 900, 470, 30);
  }

  // Names
  ctx.fillStyle="#fff"; ctx.font="bold 22px -apple-system, Arial, sans-serif"; ctx.textBaseline="top";
  ctx.fillText(eventInfo.awayName, 280, 545);
  ctx.fillText(eventInfo.homeName, 800, 545);

  // Results card
  const cardY = 620, cardH = 320;
  ctx.fillStyle = "#1a1a1a";
  roundRect(ctx, 50, cardY, 980, cardH, 14); ctx.fill();
  ctx.strokeStyle="#2a2a2a"; ctx.lineWidth=2; ctx.stroke();

  const hasOdds = waLine && (waLine.Spread!==undefined || waLine.TotalPoints!==undefined);
  if (!hasOdds) {
    ctx.fillStyle="#999"; ctx.font="bold 24px -apple-system, Arial, sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText("Final score • Lines unavailable", 540, cardY+cardH/2);
  } else {
    const colW = 980/3;
    ctx.strokeStyle="#2a2a2a"; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(50+colW, cardY+30); ctx.lineTo(50+colW, cardY+cardH-30); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(50+colW*2, cardY+30); ctx.lineTo(50+colW*2, cardY+cardH-30); ctx.stroke();

    // SPREAD result
    const favID = waLine.FavoredTeamID;
    const favIsAway = favID && String(favID).trim()===String(waLine.Team1ID||"").trim();
    const favAbbr = favIsAway ? awayAbbr : homeAbbr;
    const spread = Number(waLine.Spread||0);
    const margin = Math.abs(awayScore-homeScore);
    const favWon = favIsAway ? awayWon : (!awayWon && !tie);
    let spreadResult = "DID NOT COVER", spreadColor="#E63946";
    if (favWon) {
      if (margin > Math.abs(spread)) { spreadResult="COVERED"; spreadColor="#2ecc71"; }
      else if (margin === Math.abs(spread)) { spreadResult="PUSH"; spreadColor="#FFD60A"; }
    } else if (!favWon && !tie && margin === Math.abs(spread)) {
      spreadResult="PUSH"; spreadColor="#FFD60A";
    }
    ctx.fillStyle="#999"; ctx.font="bold 16px -apple-system, Arial, sans-serif"; ctx.textAlign="center"; ctx.textBaseline="top";
    ctx.fillText("SPREAD", 50+colW/2, cardY+40);
    ctx.fillStyle="#fff"; ctx.font="bold 36px -apple-system, Arial, sans-serif";
    ctx.fillText(`${favAbbr} ${spread}`, 50+colW/2, cardY+75);
    ctx.fillStyle=spreadColor;
    roundRect(ctx, 50+colW/2-100, cardY+140, 200, 50, 8); ctx.fill();
    ctx.fillStyle="#fff"; ctx.font="bold 20px -apple-system, Arial, sans-serif"; ctx.textBaseline="middle";
    ctx.fillText(spreadResult, 50+colW/2, cardY+165);
    // Spread result icon
    const spreadIconX = 50+colW/2+105, spreadIconY = cardY+165;
    if (spreadResult==="COVERED") drawCheckmark(ctx, spreadIconX, spreadIconY, 22);
    else if (spreadResult==="PUSH") drawPushIcon(ctx, spreadIconX, spreadIconY, 22);
    else drawXmark(ctx, spreadIconX, spreadIconY, 22);

    // ML WINNER
    ctx.fillStyle="#999"; ctx.font="bold 16px -apple-system, Arial, sans-serif"; ctx.textBaseline="top";
    ctx.fillText("ML WINNER", 50+colW+colW/2, cardY+40);
    if (tie) {
      ctx.fillStyle="#fff"; ctx.font="bold 28px -apple-system, Arial, sans-serif";
      ctx.fillText("TIE", 50+colW+colW/2, cardY+90);
      drawPushIcon(ctx, 50+colW+colW/2+50, cardY+90, 22);
    } else {
      const winAbbr = awayWon?awayAbbr:homeAbbr;
      const winName = awayWon?eventInfo.awayName:eventInfo.homeName;
      const winML = fmtJuice(awayWon?waLine.MoneyLine1:waLine.MoneyLine2);
      ctx.fillStyle="#FFD60A"; ctx.font="bold 26px -apple-system, Arial, sans-serif";
      ctx.fillText(winName, 50+colW+colW/2, cardY+90);
      // Checkmark next to winner name
      ctx.save();
      const nameW = ctx.measureText(winName).width;
      drawCheckmark(ctx, 50+colW+colW/2 + nameW/2 + 18, cardY+100, 22);
      ctx.restore();
      ctx.fillStyle="#fff"; ctx.font="bold 42px -apple-system, Arial, sans-serif";
      ctx.fillText(winML, 50+colW+colW/2, cardY+130);
    }

    // TOTAL result
    ctx.fillStyle="#999"; ctx.font="bold 16px -apple-system, Arial, sans-serif";
    ctx.fillText("TOTAL", 50+colW*2+colW/2, cardY+40);
    const total = Number(waLine.TotalPoints||0);
    const actual = awayScore+homeScore;
    let totResult="PUSH", totColor="#FFD60A";
    if (actual>total){ totResult=`OVER (${actual})`; totColor="#2ecc71"; }
    else if (actual<total){ totResult=`UNDER (${actual})`; totColor="#E63946"; }
    else { totResult=`PUSH (${actual})`; }
    ctx.fillStyle="#fff"; ctx.font="bold 36px -apple-system, Arial, sans-serif";
    ctx.fillText(`O/U ${total}`, 50+colW*2+colW/2, cardY+75);
    ctx.fillStyle="#999"; ctx.font="18px -apple-system, Arial, sans-serif";
    ctx.fillText(`Actual: ${actual}`, 50+colW*2+colW/2, cardY+118);
    ctx.fillStyle=totColor;
    roundRect(ctx, 50+colW*2+colW/2-120, cardY+140, 240, 50, 8); ctx.fill();
    ctx.fillStyle="#fff"; ctx.font="bold 20px -apple-system, Arial, sans-serif"; ctx.textBaseline="middle";
    ctx.fillText(totResult, 50+colW*2+colW/2, cardY+165);
    // Total result icon
    const totIconX = 50+colW*2+colW/2+125, totIconY = cardY+165;
    if (actual>total) drawCheckmark(ctx, totIconX, totIconY, 22);
    else if (actual<total) drawXmark(ctx, totIconX, totIconY, 22);
    else drawPushIcon(ctx, totIconX, totIconY, 22);
  }

  ctx.fillStyle="#666"; ctx.font="14px -apple-system, Arial, sans-serif"; ctx.textAlign="left"; ctx.textBaseline="top";
  ctx.fillText("WagerAttack.ag", 50, 1000);
  ctx.fillText("Must be 18+ (21+ where applicable)", 50, 1022);
  ctx.textAlign="right"; ctx.fillText("Results are final", 1030, 1022);
}

/* ============================================================
   Build merged games list
   ============================================================ */
function buildGames() {
  const sport = state.sport;
  const events = state.espnEvents || [];
  const lines = state.waLines || [];
  const used = new Set();
  const games = [];

  // Start from WA lines if we have them, merge with ESPN
  for (const line of lines) {
    // Filter out futures/novelty bets (no real game matchup)
    const t1 = waTeamName(line,1).toLowerCase();
    const t2 = waTeamName(line,2).toLowerCase();
    if (/wins (world series|championship|cup|super bowl|finals)/i.test(t1) ||
        /wins (world series|championship|cup|super bowl|finals)/i.test(t2) ||
        /team wins/i.test(t1) || /team wins/i.test(t2) ||
        /to win/i.test(t1) || /to win/i.test(t2)) continue;
    const m = matchGame(sport, line, events);
    const info = m.event ? extractEventInfo(m.event, sport) : null;
    if (m.event) used.add(m.event.id);
    // Cache this line
    updateLinesCache(sport, [line]);
    games.push({ key: line.GameNum || line.GameID || line.Team1ID+"-"+line.Team2ID, waLine: line, event: m.event, eventInfo: info });
  }
  // Add any ESPN games not matched — try to find cached WA lines for them
  for (const ev of events) {
    if (used.has(ev.id)) continue;
    const info = extractEventInfo(ev, sport);
    // Look up cached lines for this game
    const cachedLine = info ? getCachedLineByAbbrs(sport, info.awayAbbr, info.homeAbbr) : null;
    games.push({ key: ev.id, waLine: cachedLine, event: ev, eventInfo: info });
  }
  state.games = games;
}

/* ============================================================
   UI rendering
   ============================================================ */
function setStatus(which, s, msg) {
  const el = document.getElementById(which==="WA"?"stWA":"stESPN");
  const label = which==="WA"?"WagerAttack":"ESPN";
  const text = msg || ({load:"connecting…", ok:"connected", err:"offline"}[s]);
  el.innerHTML = `<span class="dot ${s}"></span>${label}: ${text}`;
}

function renderBanner() {
  const el = document.getElementById("banner");
  if (state.waStatus==="err") {
    el.innerHTML = `<div class="banner warn">Could not connect to WagerAttack odds${state.waError?` (${state.waError})`:""}. Showing ESPN scores only — graphics will render without odds.</div>`;
  } else { el.innerHTML = ""; }
}

function renderGames() {
  const root = document.getElementById("games");
  const games = state.games;
  document.getElementById("count").textContent = `${games.length} game${games.length===1?"":"s"} • ${state.sport}`;
  if (!games.length) { root.innerHTML = `<div class="empty">No games found today.</div>`; return; }
  root.innerHTML = "";
  games.forEach((g, i) => {
    const info = g.eventInfo;
    const wa = g.waLine;
    const awayAbbr = info?info.awayAbbr: (wa?resolveAbbr(state.sport, waTeamName(wa,1)):"?");
    const homeAbbr = info?info.homeAbbr: (wa?resolveAbbr(state.sport, waTeamName(wa,2)):"?");
    const awayName = info?info.awayName: (wa?waTeamName(wa,1):"Away");
    const homeName = info?info.homeName: (wa?waTeamName(wa,2):"Home");
    const status = info?info.status:"SCHEDULED";
    const badgeClass = status==="LIVE"?"live":status==="FINAL"?"final":"sched";
    const when = info&&info.date ? new Date(info.date).toLocaleString('en-US',{weekday:'short',hour:'numeric',minute:'2-digit'}) : "";

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="teams">${awayAbbr} ${awayName} @ ${homeAbbr} ${homeName}</div>
      <div class="time">${when} <span class="badge ${badgeClass}">${status}</span></div>
      ${status!=="SCHEDULED"&&info?`<div class="score">${info.awayScore} — ${info.homeScore}</div>`:""}
      ${wa?`<div class="lines">
        <span>Spread: ${fmtSpread(wa.Spread)}</span>
        <span>ML: ${fmtJuice(wa.MoneyLine1)}/${fmtJuice(wa.MoneyLine2)}</span>
        <span>O/U: ${wa.TotalPoints!==undefined?wa.TotalPoints:"--"}</span>
      </div>`:`<div class="no-odds">No WagerAttack odds available</div>`}
      <canvas data-idx="${i}" data-type="pre"></canvas>
      <div class="actions">
        <button data-dl="${i}" data-type="pre">⬇ Pre-Game PNG</button>
        ${status==="FINAL"?`<button data-dl="${i}" data-type="post" class="primary">⬇ Final PNG</button>`:""}
        <button data-sh="${i}" data-type="${status==="FINAL"?"post":"pre"}">📤 Share</button>
      </div>
    `;
    root.appendChild(card);
    const canvas = card.querySelector("canvas");
    // Render preview
    try {
      if (wa || info) {
        renderPreGame(canvas, state.sport, wa||{}, g.event, info);
      }
    } catch(e){ console.error("render pre-game failed", e); }
  });

  // Wire download buttons
  root.querySelectorAll("button[data-dl]").forEach(b=>{
    b.addEventListener("click", ()=>{
      const idx = parseInt(b.dataset.dl,10);
      const type = b.dataset.type;
      downloadGraphic(idx, type);
    });
  });
  // Wire share buttons
  root.querySelectorAll("button[data-sh]").forEach(b=>{
    b.addEventListener("click", ()=>{
      const idx = parseInt(b.dataset.sh,10);
      const type = b.dataset.type;
      shareGraphic(idx, type);
    });
  });
}

function downloadGraphic(idx, type) {
  const g = state.games[idx];
  if (!g) return;
  const canvas = document.createElement("canvas");
  if (type==="post" && g.eventInfo && g.eventInfo.status==="FINAL") {
    renderPostGame(canvas, state.sport, g.waLine||{}, g.eventInfo);
  } else {
    renderPreGame(canvas, state.sport, g.waLine||{}, g.event, g.eventInfo);
  }
  const awayAbbr = g.eventInfo?g.eventInfo.awayAbbr:(g.waLine?resolveAbbr(state.sport,waTeamName(g.waLine,1)):"AWY");
  const homeAbbr = g.eventInfo?g.eventInfo.homeAbbr:(g.waLine?resolveAbbr(state.sport,waTeamName(g.waLine,2)):"HOM");
  const fn = `WA_${state.sport}_${awayAbbr}-${homeAbbr}_${type}.png`;
  const a = document.createElement("a");
  a.href = canvas.toDataURL("image/png");
  a.download = fn;
  document.body.appendChild(a); a.click(); a.remove();
}

function renderSlate(canvas, sport, games) {
  const ctx = canvas.getContext("2d");
  canvas.width = 1080; canvas.height = 1080;
  ctx.fillStyle = "#111"; ctx.fillRect(0,0,1080,1080);
  ctx.fillStyle = "#E63946"; ctx.fillRect(0,0,1080,6);
  drawDiagonalStripes(ctx, "#E63946", 0.04);

  // Header
  ctx.fillStyle="#fff"; ctx.font="bold 32px -apple-system, Arial, sans-serif"; ctx.textAlign="left"; ctx.textBaseline="top";
  ctx.fillText("WAGERATTACK", 50, 40);
  ctx.fillStyle="#999"; ctx.font="bold 24px -apple-system, Arial, sans-serif"; ctx.textAlign="right";
  ctx.fillText("TODAY'S "+sport.toUpperCase()+" SLATE", 1030, 46);

  // Subheader date
  const today = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}).toUpperCase();
  ctx.fillStyle="#FFD60A"; ctx.font="bold 22px -apple-system, Arial, sans-serif"; ctx.textAlign="center";
  ctx.fillText(today, 540, 95);

  // Column headers
  const startY = 150;
  ctx.fillStyle="#999"; ctx.font="bold 14px -apple-system, Arial, sans-serif"; ctx.textBaseline="top";
  ctx.textAlign="left"; ctx.fillText("MATCHUP", 60, startY);
  ctx.textAlign="center"; ctx.fillText("SPREAD", 640, startY);
  ctx.fillText("TOTAL", 790, startY);
  ctx.fillText("ML", 940, startY);
  ctx.strokeStyle="#2a2a2a"; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(50,startY+24); ctx.lineTo(1030,startY+24); ctx.stroke();

  // Rows (max 14)
  const rows = games.slice(0,14);
  const rowH = 56;
  let y = startY + 36;
  rows.forEach((g, idx) => {
    const wa = g.waLine;
    const info = g.eventInfo;
    const awayAbbr = info?info.awayAbbr:(wa?resolveAbbr(sport,waTeamName(wa,1)):"AWY");
    const homeAbbr = info?info.homeAbbr:(wa?resolveAbbr(sport,waTeamName(wa,2)):"HOM");
    // Alt row background
    if (idx%2===0){ ctx.fillStyle="#1a1a1a"; ctx.fillRect(50,y-6,980,rowH-4); }
    // Mini circles
    const awayLogo = info && getLogo(info.awayLogo);
    const homeLogo = info && getLogo(info.homeLogo);
    drawTeamCircle(ctx, 85, y+18, 20, teamColors(sport,awayAbbr), awayAbbr, "#333", awayLogo);
    drawTeamCircle(ctx, 135, y+18, 20, teamColors(sport,homeAbbr), homeAbbr, "#333", homeLogo);
    // Matchup text
    ctx.fillStyle="#fff"; ctx.font="bold 18px -apple-system, Arial, sans-serif"; ctx.textAlign="left"; ctx.textBaseline="middle";
    ctx.fillText(`${awayAbbr} @ ${homeAbbr}`, 170, y+18);
    // Time
    ctx.fillStyle="#999"; ctx.font="12px -apple-system, Arial, sans-serif";
    const when = info&&info.date ? new Date(info.date).toLocaleString('en-US',{hour:'numeric',minute:'2-digit'}) : "";
    const statusTxt = info&&info.status==="FINAL" ? "FINAL" : (info&&info.status==="LIVE"?"LIVE":when);
    ctx.fillText(statusTxt, 170, y+38);
    // Spread
    ctx.fillStyle="#FFD60A"; ctx.font="bold 18px -apple-system, Arial, sans-serif"; ctx.textAlign="center";
    if (wa && wa.Spread!==undefined) {
      const favID = wa.FavoredTeamID;
      const favIsAway = favID && String(favID).trim()===String(wa.Team1ID||"").trim();
      const favAbbr = favIsAway?awayAbbr:homeAbbr;
      ctx.fillText(`${favAbbr} ${Number(wa.Spread)}`, 640, y+18);
    } else { ctx.fillStyle="#555"; ctx.fillText("--", 640, y+18); }
    // Total
    ctx.fillStyle="#FFD60A"; ctx.font="bold 18px -apple-system, Arial, sans-serif";
    if (wa && wa.TotalPoints!==undefined) ctx.fillText(`O/U ${wa.TotalPoints}`, 790, y+18);
    else { ctx.fillStyle="#555"; ctx.fillText("--", 790, y+18); }
    // ML
    ctx.fillStyle="#ccc"; ctx.font="bold 14px -apple-system, Arial, sans-serif";
    if (wa && wa.MoneyLine1!==undefined) {
      ctx.fillText(`${fmtJuice(wa.MoneyLine1)}/${fmtJuice(wa.MoneyLine2)}`, 940, y+18);
    } else { ctx.fillStyle="#555"; ctx.fillText("--", 940, y+18); }
    // Score if final/live
    if (info && (info.status==="FINAL"||info.status==="LIVE")) {
      ctx.fillStyle="#fff"; ctx.font="bold 14px -apple-system, Arial, sans-serif"; ctx.textAlign="left";
      ctx.fillText(`${info.awayScore}-${info.homeScore}`, 500, y+18);
    }
    y += rowH;
  });

  if (games.length>14) {
    ctx.fillStyle="#999"; ctx.font="italic 14px -apple-system, Arial, sans-serif"; ctx.textAlign="center"; ctx.textBaseline="top";
    ctx.fillText(`+ ${games.length-14} more games`, 540, y+10);
  }

  // Footer
  ctx.fillStyle="#666"; ctx.font="14px -apple-system, Arial, sans-serif"; ctx.textAlign="left"; ctx.textBaseline="top";
  ctx.fillText("WagerAttack.ag", 50, 1000);
  ctx.fillText("Must be 18+ (21+ where applicable)", 50, 1022);
  ctx.textAlign="right"; ctx.fillText("Lines subject to change", 1030, 1022);
}

function downloadSlate() {
  const canvas = document.createElement("canvas");
  renderSlate(canvas, state.sport, state.games||[]);
  const a = document.createElement("a");
  a.href = canvas.toDataURL("image/png");
  a.download = `WA_${state.sport}_slate.png`;
  document.body.appendChild(a); a.click(); a.remove();
}

/* ============================================================
   Share (Telegram + Instagram via native share sheet on mobile,
   download + Telegram web-share fallback on desktop)
   ============================================================ */
const WA_SITE_URL = "https://walkillz.github.io/wa-graphics/";
function showToast(msg, ms){
  let t=document.getElementById("__wa_toast");
  if(!t){ t=document.createElement("div"); t.id="__wa_toast";
    t.style.cssText="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:12px 18px;border:1px solid #E63946;border-radius:8px;font:bold 14px -apple-system,Arial,sans-serif;z-index:99999;max-width:90%;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.5)";
    document.body.appendChild(t);
  }
  t.textContent=msg; t.style.display="block";
  clearTimeout(t.__timer); t.__timer=setTimeout(()=>t.style.display="none", ms||4000);
}
function canvasToBlob(canvas){
  return new Promise(res => canvas.toBlob(b => res(b), "image/png"));
}
async function shareCanvas(canvas, filename, caption){
  const blob = await canvasToBlob(canvas);
  if(!blob){ showToast("Could not generate image"); return; }
  const file = new File([blob], filename, {type:"image/png"});
  if(navigator.canShare && navigator.canShare({files:[file]})){
    try {
      await navigator.share({files:[file], title:"WagerAttack", text:caption});
      return;
    } catch(e){ if(e.name==="AbortError") return; console.warn("share failed, falling back", e); }
  }
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
  try { await navigator.clipboard.writeText(caption); } catch(e){}
  const tgUrl = "https://t.me/share/url?url=" + encodeURIComponent(WA_SITE_URL) + "&text=" + encodeURIComponent(caption);
  window.open(tgUrl, "_blank", "noopener");
  showToast("PNG saved + caption copied. Telegram opened in new tab. For Instagram, upload the PNG from the IG app.", 6000);
}
function shareGraphic(idx, type){
  const g = state.games[idx]; if(!g) return;
  const canvas = document.createElement("canvas");
  if(type==="post" && g.eventInfo && g.eventInfo.status==="FINAL"){
    renderPostGame(canvas, state.sport, g.waLine||{}, g.eventInfo);
  } else {
    renderPreGame(canvas, state.sport, g.waLine||{}, g.event, g.eventInfo);
  }
  const awayAbbr = g.eventInfo?g.eventInfo.awayAbbr:"AWY";
  const homeAbbr = g.eventInfo?g.eventInfo.homeAbbr:"HOM";
  const fn = `WA_${state.sport}_${awayAbbr}-${homeAbbr}_${type}.png`;
  const caption = `${awayAbbr} @ ${homeAbbr} — ${state.sport} odds on WagerAttack. ${WA_SITE_URL} #WagerAttack #${state.sport}`;
  shareCanvas(canvas, fn, caption);
}
function shareSlate(){
  const canvas = document.createElement("canvas");
  renderSlate(canvas, state.sport, state.games||[]);
  const fn = `WA_${state.sport}_slate.png`;
  const today = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const caption = `${today} ${state.sport} slate — lines on WagerAttack. ${WA_SITE_URL} #WagerAttack #${state.sport}`;
  shareCanvas(canvas, fn, caption);
}

async function downloadAll() {
  for (let i=0;i<state.games.length;i++) {
    const g = state.games[i];
    if (g.eventInfo && g.eventInfo.status==="FINAL") downloadGraphic(i,"post");
    else downloadGraphic(i,"pre");
    await new Promise(r=>setTimeout(r,200));
  }
}

/* ============================================================
   Init / load flow
   ============================================================ */
async function loadSport(sport) {
  state.sport = sport;
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active", t.dataset.sport===sport));
  document.getElementById("games").innerHTML = `<div class="empty">Loading ${sport}…</div>`;

  // ESPN
  try {
    setStatus("ESPN","load");
    state.espnEvents = await espnScoreboard(sport);
    state.espnStatus = "ok"; setStatus("ESPN","ok",`${state.espnEvents.length} games`);
  } catch(e) {
    state.espnStatus="err"; state.espnEvents=[]; setStatus("ESPN","err", e.message);
  }

  // WagerAttack
  try {
    if (!state.token) await waAuth();
    state.waLines = await waGetLines(sport);
    if (state.waLines.length) updateLinesCache(sport, state.waLines);
    state.waStatus="ok"; setStatus("WA","ok",`${state.waLines.length} lines`);
    state.waError = null;
  } catch(e) {
    // try re-auth once
    try {
      await waAuth();
      state.waLines = await waGetLines(sport);
      if (state.waLines.length) updateLinesCache(sport, state.waLines);
      state.waStatus="ok"; setStatus("WA","ok",`${state.waLines.length} lines`);
    } catch(e2) {
      state.waStatus="err"; state.waLines=[]; state.waError=e2.message;
      setStatus("WA","err", e2.message);
    }
  }

  renderBanner();
  buildGames();
  // Preload logos (including fallback URLs), then render
  const logoUrls = [];
  state.games.forEach(g => {
    if (g.eventInfo) {
      logoUrls.push(g.eventInfo.awayLogo, g.eventInfo.homeLogo);
    } else if (g.waLine) {
      // Generate fallback logos for WA-only games
      const a = resolveAbbr(sport, waTeamName(g.waLine,1));
      const h = resolveAbbr(sport, waTeamName(g.waLine,2));
      if (a) logoUrls.push(getTeamLogo(sport, a, null));
      if (h) logoUrls.push(getTeamLogo(sport, h, null));
    }
  });
  try { await preloadLogos(logoUrls); } catch(e) { console.warn("logo preload", e); }
  renderGames();
}

/* ---------- Silent refresh (no loading UI wipe) ---------- */
async function silentRefresh() {
  const sport = state.sport;
  try {
    state.espnEvents = await espnScoreboard(sport);
    state.espnStatus = "ok"; setStatus("ESPN","ok",`${state.espnEvents.length} games`);
  } catch(e) { state.espnStatus="err"; setStatus("ESPN","err", e.message); }
  try {
    if (!state.token) await waAuth();
    state.waLines = await waGetLines(sport);
    if (state.waLines.length) updateLinesCache(sport, state.waLines);
    state.waStatus="ok"; setStatus("WA","ok",`${state.waLines.length} lines`);
  } catch(e) {
    try { await waAuth(); state.waLines = await waGetLines(sport); if (state.waLines.length) updateLinesCache(sport, state.waLines); state.waStatus="ok"; setStatus("WA","ok",`${state.waLines.length} lines`); }
    catch(e2){ state.waStatus="err"; state.waError=e2.message; setStatus("WA","err",e2.message); }
  }
  renderBanner();
  buildGames();
  const logoUrls = [];
  state.games.forEach(g => {
    if (g.eventInfo) {
      logoUrls.push(g.eventInfo.awayLogo, g.eventInfo.homeLogo);
    } else if (g.waLine) {
      const a = resolveAbbr(sport, waTeamName(g.waLine,1));
      const h = resolveAbbr(sport, waTeamName(g.waLine,2));
      if (a) logoUrls.push(getTeamLogo(sport, a, null));
      if (h) logoUrls.push(getTeamLogo(sport, h, null));
    }
  });
  try { await preloadLogos(logoUrls); } catch(e) {}
  renderGames();
}

function hasLiveGame() {
  return (state.games||[]).some(g => g.eventInfo && g.eventInfo.status === "LIVE");
}

let __liveTimer=null, __fullTimer=null;
function startAutoRefresh() {
  if (__liveTimer) clearInterval(__liveTimer);
  if (__fullTimer) clearInterval(__fullTimer);
  // 30s tick: refresh scores only if a game is live
  __liveTimer = setInterval(() => { if (hasLiveGame()) silentRefresh(); }, 30000);
  // 5 min tick: always refresh schedule + odds
  __fullTimer = setInterval(silentRefresh, 300000);
}

function init() {
  document.querySelectorAll(".tab").forEach(t=>{
    t.addEventListener("click", ()=>loadSport(t.dataset.sport));
  });
  document.getElementById("refresh").addEventListener("click", ()=>{ state.token=null; loadSport(state.sport); });
  document.getElementById("dlAll").addEventListener("click", downloadAll);
  document.getElementById("dlSlate").addEventListener("click", downloadSlate);
  document.getElementById("shSlate").addEventListener("click", shareSlate);
  loadSport("MLB");
  startAutoRefresh();
}

init();
</script>
